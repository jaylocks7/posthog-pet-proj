name: Update Engineer Impact Dashboard

on:
  schedule:
    - cron: '0 8 * * *'   # midnight PT (UTC-8 / PST)
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests python-dotenv

      - name: Fetch data and score engineers
        run: python fetch-posthog-data.py
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PAT }}

      - name: Commit and push updated data.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "chore: update engineer impact data [skip ci]"
          git push
